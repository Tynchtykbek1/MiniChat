<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - MiniChat</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="chat-page">
  <main class="chat-container">
    <header class="chat-header">
      <h1>MiniChat</h1>
      <div>
        <span>Logged in as <strong id="current-user-name"></strong></span>
        <a id="admin-link" class="admin-link" href="/admin.html">Admin</a>
        <button id="logout-button" type="button">Logout</button>
      </div>
    </header>

    <div class="chat-layout">
      <aside class="users-panel">
        <h2>Users</h2>
        <div id="users-list"></div>
      </aside>

      <section class="conversation-panel">
        <div class="conversation-header">
          <h2 id="chat-title">Select a user</h2>
        </div>

        <div id="messages-list" class="messages-list">
          <p class="empty-chat">Choose a user to view messages.</p>
        </div>

        <form id="message-form" class="message-form">
          <input type="text" id="message-input" placeholder="Write a message" autocomplete="off">
          <button type="submit">Send</button>
        </form>
      </section>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
